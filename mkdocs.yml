site_name: Horizon-QA Documentation
site_url: https://GTNewHorizons.github.io/Horizon-QA/
repo_url: https://github.com/GTNewHorizons/Horizon-QA
repo_name: GTNewHorizons/Horizon-QA

theme:
  name: material
  features:
    - navigation.top
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets

plugins:
  - search

nav:
  - Home: index.md
  - Test Events: events.md
  - Javadoc API: https://GTNewHorizons.github.io/Horizon-QA/javadoc/index.html
