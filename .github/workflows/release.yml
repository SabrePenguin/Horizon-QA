name: "Publish"

on:
  push:
    tags:
      - "*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: JDK
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "zulu"

      - name: Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-provider: enhanced

      - name: Make gradle executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build

      - name: Maven Publish
        env:
          MAVEN_USER: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew publish

      - name: Publish
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
